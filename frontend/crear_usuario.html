<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - Panel Admin | I.E. Leonor Cerna</title>
    <link rel="icon" href="assets/insignia.webp" type="image/webp">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/insignia.webp" alt="Logo" class="sidebar-logo" onerror="this.src='https://via.placeholder.com/50/3D52A0/FFFFFF?text=LC';">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin_dashboard.html">👥 Usuarios Registrados</a>
                <a href="crear_usuario.html" class="active">➕ Crear Usuario</a>
                <a href="login.html" class="logout-btn">🚪 Cerrar Sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>Registro de Nuevo Usuario</h1>
                <div class="admin-profile">
                    <span>Bienvenido, <strong>Administrador</strong></span>
                </div>
            </header>

            <section class="form-section">
                <div class="form-container">
                    <div class="form-header">
                        <h2>Datos del Usuario</h2>
                        <p>Completa la información para dar de alta a un nuevo integrante en el sistema.</p>
                    </div>

                    <form id="crearUsuarioForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nombres">Nombres Completos</label>
                                <input type="text" id="nombres" required placeholder="Ej: Juan Carlos">
                            </div>
                            <div class="form-group">
                                <label for="apellidos">Apellidos</label>
                                <input type="text" id="apellidos" required placeholder="Ej: Pérez Pingo">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="correo_usuario">Correo Electrónico o Usuario</label>
                                <input type="email" id="correo_usuario" required placeholder="juanperez@colegio.edu.pe">
                            </div>
                            <div class="form-group">
                                <label for="rol">Rol en el Sistema</label>
                                <select id="rol" required>
                                    <option value="" disabled selected>Seleccione un rol...</option>
                                    <option value="alumno">Estudiante</option>
                                    <option value="psicologo">Psicólogo / Tutor</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="password_nueva">Contraseña Temporal</label>
                                <input type="text" id="password_nueva" required placeholder="Asigna una clave inicial">
                                <small class="form-help">El usuario podrá cambiarla después.</small>
                            </div>
                        </div>
                        <div class="form-row" id="datosAlumno" style="display:none;">

                        <div class="form-group">
                            <label for="grado">Grado Académico</label>
                            <select id="grado">
                                <option value="">Seleccione grado...</option>
                                <option value="1ro">1ro Secundaria</option>
                                <option value="2do">2do Secundaria</option>
                                <option value="3ro">3ro Secundaria</option>
                                <option value="4to">4to Secundaria</option>
                                <option value="5to">5to Secundaria</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="seccion">Sección</label>
                            <select id="seccion">
                                <option value="">Seleccione sección...</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        </div>
                        
                        <div class="form-actions">
                            <a href="admin_dashboard.html" class="btn-cancel">Cancelar</a>
                            <button type="submit" class="btn-save">Registrar Usuario</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
